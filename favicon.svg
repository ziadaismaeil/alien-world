<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark void background -->
  <circle cx="32" cy="32" r="32" fill="#05003a"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#4488ff" stroke-width="0.8" opacity="0.35"/>

  <style>
    @keyframes favicon-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .zyrax-body { transform-origin: 32px 32px; animation: favicon-spin 6s linear infinite; }
  </style>

  <g class="zyrax-body">
    <!-- Outer hexagon crystal -->
    <polygon points="32,6 52,18 52,42 32,54 12,42 12,18"
             fill="rgba(68,136,255,0.15)" stroke="#4488ff" stroke-width="1.8"/>
    <!-- Inner hexagon -->
    <polygon points="32,14 46,22 46,38 32,46 18,38 18,22"
             fill="rgba(136,170,255,0.1)" stroke="#88aaff" stroke-width="1.2"/>

    <!-- Cross axis lines -->
    <line x1="32" y1="6"  x2="32" y2="54" stroke="#4488ff" stroke-width="0.6" opacity="0.4"/>
    <line x1="12" y1="30" x2="52" y2="30" stroke="#4488ff" stroke-width="0.6" opacity="0.4"/>
    <line x1="12" y1="18" x2="52" y2="42" stroke="#4488ff" stroke-width="0.4" opacity="0.25"/>
    <line x1="52" y1="18" x2="12" y2="42" stroke="#4488ff" stroke-width="0.4" opacity="0.25"/>

    <!-- Eyes -->
    <circle cx="24" cy="29" r="4"   fill="#88aaff" opacity="0.95"/>
    <circle cx="40" cy="29" r="4"   fill="#88aaff" opacity="0.95"/>
    <circle cx="24" cy="29" r="2"   fill="white"/>
    <circle cx="40" cy="29" r="2"   fill="white"/>
    <!-- Eye glow -->
    <circle cx="24" cy="29" r="4.5" fill="none" stroke="#aaccff" stroke-width="0.8" opacity="0.6"/>
    <circle cx="40" cy="29" r="4.5" fill="none" stroke="#aaccff" stroke-width="0.8" opacity="0.6"/>

    <!-- Mouth triangle -->
    <polygon points="32,38 27,45 37,45"
             fill="none" stroke="#88aaff" stroke-width="1.2" opacity="0.7"/>

    <!-- Inner crystal core -->
    <polygon points="32,20 38,26 38,34 32,40 26,34 26,26"
             fill="rgba(100,150,255,0.12)" stroke="#aabbff" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- Static star dots in corners (don't spin) -->
  <circle cx="7"  cy="9"  r="1"   fill="#ffffff" opacity="0.6"/>
  <circle cx="57" cy="12" r="0.8" fill="#aaccff" opacity="0.5"/>
  <circle cx="9"  cy="56" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="56" cy="54" r="1"   fill="#4488ff" opacity="0.6"/>
</svg>
