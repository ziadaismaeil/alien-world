<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark space background -->
  <circle cx="32" cy="32" r="32" fill="#0a0015"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#ff4400" stroke-width="2" opacity="0.5"/>

  <!-- Planet body -->
  <circle cx="32" cy="32" r="20" fill="#1a0400"/>
  <circle cx="32" cy="32" r="20" fill="url(#planetGrad)"/>

  <!-- Lava crack lines on planet -->
  <line x1="26" y1="20" x2="24" y2="36" stroke="#ff4400" stroke-width="1.5" opacity="0.8"/>
  <line x1="24" y1="36" x2="30" y2="44" stroke="#ff6600" stroke-width="1.2" opacity="0.7"/>
  <line x1="36" y1="22" x2="38" y2="34" stroke="#ff4400" stroke-width="1.2" opacity="0.6"/>

  <!-- Alien eye — the centrepiece -->
  <ellipse cx="32" cy="30" rx="9" ry="6" fill="#000"/>
  <ellipse cx="32" cy="30" rx="9" ry="6" fill="none" stroke="#ffff00" stroke-width="1.5"/>
  <!-- Iris -->
  <circle cx="32" cy="30" r="4.5" fill="#ff4400"/>
  <!-- Pupil -->
  <ellipse cx="32" cy="30" rx="2" ry="3.5" fill="#000"/>
  <!-- Eye glow -->
  <circle cx="32" cy="30" r="4.5" fill="none" stroke="#ffff00" stroke-width="0.8" opacity="0.9"/>
  <!-- Eye glint -->
  <circle cx="29.5" cy="28" r="1.2" fill="#ffffff" opacity="0.8"/>

  <!-- Orbit ring around planet -->
  <ellipse cx="32" cy="32" rx="28" ry="8" fill="none" stroke="#ff6600" stroke-width="1.8" opacity="0.6" transform="rotate(-20 32 32)"/>

  <!-- Small star dots -->
  <circle cx="8"  cy="10" r="1"   fill="#ffffff" opacity="0.7"/>
  <circle cx="55" cy="14" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="12" cy="52" r="0.8" fill="#ffff00" opacity="0.8"/>
  <circle cx="56" cy="50" r="1"   fill="#ffffff" opacity="0.5"/>
  <circle cx="52" cy="8"  r="0.6" fill="#aaaaff" opacity="0.7"/>

  <defs>
    <radialGradient id="planetGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#552200"/>
      <stop offset="60%"  stop-color="#1a0400"/>
      <stop offset="100%" stop-color="#0a0200"/>
    </radialGradient>
  </defs>
</svg>
