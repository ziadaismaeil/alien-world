<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alien World</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Landing Screen -->
  <div id="landing-screen">
    <div id="landing-title">
      <h1>ALIEN <em>/ WORLD</em></h1>
      <p>∞ alien perspectives · one city · Weimar</p>
    </div>
    <div id="landing-buttons">
      <button id="btn-laptop" class="landing-btn">
        <span class="btn-icon">⌨</span>
        <span class="btn-label">LAPTOP</span>
        <span class="btn-sub">WASD + Mouse</span>
      </button>
      <button id="btn-phone" class="landing-btn">
        <span class="btn-icon">📱</span>
        <span class="btn-label">PHONE</span>
        <span class="btn-sub">Touch Controls</span>
      </button>
    </div>
    <div id="landing-characters">
      <!-- Injected by ui.js -->
    </div>
  </div>

  <!-- Phone: Character Picker Button (top-left, shown in phone mode) -->
  <button id="char-picker-btn">
    <span id="picker-btn-symbol">◆</span>
    <div id="picker-btn-text">
      <span id="picker-btn-name">ZYRAX</span>
      <span id="picker-btn-hint">tap to switch ▾</span>
    </div>
  </button>

  <!-- Phone: Character Picker Modal -->
  <div id="char-picker-modal">
    <div id="char-picker-header">
      <span id="char-picker-title">CHOOSE YOUR REALITY</span>
      <button id="char-picker-close">×</button>
    </div>
    <div id="char-picker-grid">
      <!-- Injected by ui.js -->
    </div>
  </div>

  <!-- Touch Controls (phone mode only) -->
  <div id="touch-controls">
    <div id="dpad">
      <button class="dpad-btn" id="dpad-up">▲</button>
      <div class="dpad-row">
        <button class="dpad-btn" id="dpad-left">◄</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" id="dpad-right">►</button>
      </div>
      <button class="dpad-btn" id="dpad-down">▼</button>
    </div>
    <button id="touch-cam-btn">CAM<br><small>C</small></button>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="loading-orb"></div>
      <div class="loading-text">CALIBRATING REALITIES</div>
      <div class="loading-sub">Weimar · 2km radius · ∞ perspectives</div>
    </div>
  </div>

  <!-- Character Selection Panel -->
  <div id="character-panel">
    <div class="panel-header">
      <h1 class="title">ALIEN<br><em>WORLD</em></h1>
      <p class="subtitle">↓ choose your reality ↓</p>
    </div>
    <div id="character-grid">
      <!-- Injected by ui.js -->
    </div>
  </div>

  <!-- Active Character Overlay -->
  <div id="character-info" class="hidden">
    <div id="char-symbol"></div>
    <div id="char-name"></div>
    <div id="char-planet"></div>
    <div id="char-personality"></div>
    <div id="char-backstory"></div>
  </div>

  <!-- Backstory toggle -->
  <button id="lore-toggle" class="hidden" title="Toggle lore">?</button>

  <!-- Controls -->
  <div id="controls-hint">
    <span>drag</span> to orbit &nbsp;·&nbsp; <span>scroll</span> to zoom &nbsp;·&nbsp; <span>right-drag</span> to pan
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
